services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STREAM_NAME=task_stream

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STREAM_NAME=task_stream
      - CONSUMER_GROUP=workers
    # Phase 4: Graceful shutdown configuration
    # Time allowed for worker to complete current task before SIGKILL
    stop_grace_period: 30s
    deploy:
      replicas: 2

volumes:
  redis_data:
